<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Service - Rucoy Online</title>
<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    
    const db = getDatabase(initializeApp({
        databaseURL: "https://shareskill-8d1fe-default-rtdb.firebaseio.com"
    }));

    // Sincronización Estado
    const estadoRef = ref(db, 'disponible');
    onValue(estadoRef, (s) => {
        window.estaDisponible = s.val();
        let el = document.getElementById("estado-servicio");
        el.innerText = window.estaDisponible ? "🟢 SERVICIO DISPONIBLE" : "🔴 NO DISPONIBLE";
        el.style.background = window.estaDisponible ? "rgba(0, 255, 0, 0.2)" : "rgba(255, 0, 0, 0.2)";
        document.getElementById("boton-whatsapp").style.pointerEvents = window.estaDisponible ? "auto" : "none";
    });
    window.cambiarEstado = () => set(estadoRef, !window.estaDisponible);
</script>

<style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background-color: #030008; background-position: center; background-size: cover; background-attachment: fixed; transition: background-image 1s ease-in-out; }
    .caja { border: 2px solid rgba(0, 242, 255, 0.7); padding: 25px; border-radius: 16px; background: rgba(6, 2, 16, 0.85); backdrop-filter: blur(8px); width: 100%; max-width: 450px; }
    #estado-servicio { text-align: center; margin-bottom: 10px; font-weight: bold; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #00f2ff; }
    h1 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 24px; margin: 0 0 5px 0; text-align: center; cursor: pointer; }
    .subtitle { color: #ffd700; font-weight: bold; margin-bottom: 15px; font-size: 13px; text-align: center; }
    label { display: block; margin: 10px 0 4px 0; font-size: 13px; color: #ccc; }
    input, select { padding: 10px; width: 100%; border-radius: 6px; border: 1px solid rgba(0, 242, 255, 0.5); background: rgba(7, 13, 26, 0.8); color: white; margin-bottom: 5px; cursor: pointer;}
    .resultado-caja { background: rgba(0, 242, 255, 0.1); border: 1px dashed rgba(0, 242, 255, 0.5); padding: 12px; margin-top: 15px; border-radius: 6px; text-align: center; }
    .total-oro { color: #ffd700; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #ffd700; }
    .btn-wa { background: #25D366; color: white; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 6px; display: block; text-align: center; margin-top: 15px; }
    #panel-admin { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; }
</style>
</head>
<body>

    <div class="caja">
        <div id="estado-servicio" onclick="cambiarEstado()">Cargando...</div>
        <h1 ondblclick="document.getElementById('panel-admin').style.display='block'">🛡️ SAFEGAMING SERVICE 🛡️</h1>
        <div class="subtitle">RUCOY ONLINE: PROFESIONAL</div>
        
        <label>Nombre del Personaje:</label>
        <input type="text" id="personaje" placeholder="Ej: RucoyPro">

        <label>Elige tu Profesión:</label>
        <select id="clase">
            <option value="Melee">⚔️ Melee</option>
            <option value="Distance">🏹 Distancia</option>
            <option value="Magic">✨ Magia</option>
        </select>

        <label>Servicio:</label>
        <select id="servicio" onchange="calcularTotal()">
            <option value="300">Skill Normal - $300k / hr</option>
            <option value="360">Power Training - $360k / hr</option>
            <option value="600">Subida de Nivel - $600k / hr</option>
            <option value="1400">Pack Maraton (5h) - 1.4KK</option>
            <option value="1700">Pack Ptrain Pro (5h) - 1.7KK</option>
        </select>

        <label>Cantidad de Horas:</label>
        <input type="number" id="horas" value="1" oninput="calcularTotal()">

        <div class="resultado-caja">
            <div class="total-oro" id="precio-final">300k gold</div>
        </div>

        <a href="#" id="boton-whatsapp" class="btn-wa" onclick="document.getElementById('sonido-level').play()">💬 APARTAR CUPO POR WHATSAPP</a>

        <!-- Panel Admin -->
        <div id="panel-admin">
            <input type="text" id="admin-nombre" placeholder="Nombre cliente">
            <input type="number" id="admin-horas" placeholder="Horas">
            <button onclick="generarLink()" style="width:100%; padding:10px;">GENERAR LINK SEGUIMIENTO</button>
            <div id="link-generado" style="color:#ffd700; font-size:11px; margin-top:10px; word-break:break-all;"></div>
        </div>
    </div>

    <audio id="sonido-level" src="https://www.myinstants.com/media/sounds/level-up-sound-effect.mp3"></audio>

    <script>
        function calcularTotal() {
            let p = document.getElementById("servicio").value;
            let h = parseInt(document.getElementById("horas").value) || 1;
            let total = (p >= 1400) ? p : p * h;
            let texto = (total >= 1000) ? (total / 1000) + "KK gold" : total + "k gold";
            document.getElementById("precio-final").innerText = texto;
            
            let msg = `Hola! Quiero el servicio de ${document.getElementById("servicio").options[document.getElementById("servicio").selectedIndex].text} para ${document.getElementById("personaje").value}`;
            document.getElementById("boton-whatsapp").href = "https://wa.me/584123576579?text=" + encodeURIComponent(msg);
        }

        function generarLink() {
            let n = document.getElementById("admin-nombre").value;
            let h = document.getElementById("admin-horas").value;
            document.getElementById("link-generado").innerText = window.location.href + "?cliente=" + n + "&horas=" + h;
        }

        const fondos = ["https://assets-prd.ignimgs.com/2025/08/27/solothumb-1756317128314.png", "https://sm.ign.com/t/ign_in/photo/default/solo-leveling-arise-overdrive-blogroll-1759428421562_e9mp.1280.jpg"];
        let i = 0; setInterval(() => { document.body.style.backgroundImage = "url('" + fondos[i] + "')"; i = (i + 1) % fondos.length; }, 30000);
        window.onload = calcularTotal;
    </script>
</body>
</html>
