<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Safegaming Service - Rucoy Online</title>
<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px 10px;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        background: radial-gradient(circle at 50% 20%, rgba(0, 242, 255, 0.08) 0%, transparent 50%),
                    linear-gradient(160deg, #030712 0%, #06101e 100%);
        background-attachment: fixed;
    }

    .caja {
        border: 2px solid #00f2ff;
        padding: 20px;
        border-radius: 14px;
        background: rgba(6,16,30,0.95);
        box-shadow: 0 0 20px rgba(0,242,255,0.3);
        width: 100%;
        max-width: 450px; /* Tamaño perfecto para escritorio y móvil */
        backdrop-filter: blur(5px);
    }

    h1 { color: #00f2ff; font-size: 24px; margin: 0 0 5px 0; text-shadow: 0 0 10px #00f2ff; }
    .subtitle { color: #ffd700; font-weight: bold; margin-bottom: 15px; font-size: 13px; letter-spacing: 1px; }
    
    .horario-box {
        background: rgba(255, 215, 0, 0.07);
        border: 1px solid rgba(255, 215, 0, 0.4);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 15px;
        font-size: 12px;
        color: #ffd700;
    }

    label { display: block; text-align: left; margin: 10px 0 5px 0; color: #a0aab5; font-size: 13px; }
    input, select {
        padding: 12px; /* Más fácil de tocar en móviles */
        width: 100%;
        border-radius: 6px;
        border: 1px solid #00f2ff;
        background: #06101e;
        color: white;
        font-size: 16px; /* Evita zoom automático en iOS */
    }

    .resultado-caja { background: rgba(0, 242, 255, 0.1); border: 1px dashed #00f2ff; padding: 15px; margin: 20px 0; border-radius: 6px; }
    .total-oro { color: #ffd700; font-size: 20px; font-weight: bold; }

    .btn-wa {
        background: #25D366;
        color: white;
        padding: 15px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 6px;
        display: block;
        width: 100%;
        font-size: 15px;
        text-align: center;
    }

    .btn-personalizado {
        display: block;
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ffd700;
        background: rgba(255, 215, 0, 0.05);
        color: #ffd700;
        text-decoration: none;
        font-size: 13px;
        text-align: center;
    }

    .footer { margin-top: 20px; color: #5a6472; font-size: 11px; text-align: center; line-height: 1.4; }
</style>
</head>
<body>

    <div class="caja">
        <h1>🛡️ SAFEGAMING</h1>
        <div class="subtitle">RUCOY ONLINE: SHARE & SKILLEO</div>
        
        <div class="horario-box">🕒 <b>HORARIO:</b> 9:00 AM - 7:00 PM</div>
        
        <label>Tu Personaje:</label>
        <input type="text" id="personaje" value="JugadorAnonimo">

        <label>Servicio:</label>
        <select id="servicio" onchange="calcularTotal()">
            <option value="300">Skill Normal - 300k/hr</option>
            <option value="360">Power Training - 360k/hr</option>
            <option value="600">Subida de Nivel - 600k/hr</option>
            <option value="1400">Pack Maraton (5h) - 1.4KK</option>
            <option value="1700">Pack Ptrain Pro (5h) - 1.7KK</option>
        </select>

        <div id="caja-horas">
            <label>Horas:</label>
            <input type="number" id="horas" value="1" min="1" max="24" oninput="calcularTotal()">
        </div>

        <div class="resultado-caja">
            <div style="color:#a0aab5; font-size:12px;">Total estimado:</div>
            <div class="total-oro" id="precio-final">300k gold</div>
        </div>

        <a href="#" id="boton-whatsapp" class="btn-wa" target="_blank">💬 APARTAR CUPO</a>
        <a href="https://wa.me/584123576579" class="btn-personalizado" target="_blank">📩 Cotización personalizada</a>
    </div>

    <div class="footer">
        Servicio profesional de Skilleo y Share<br>
        WhatsApp: +58 412-3576579
    </div>

    <script>
        function calcularTotal() {
            let p = document.getElementById("personaje").value;
            let s = document.getElementById("servicio");
            let val = parseInt(s.value);
            let nombre = s.options[s.selectedIndex].text.split('-')[0].trim();
            let h = parseInt(document.getElementById("horas").value) || 1;
            
            let total = (val === 1400 || val === 1700) ? val : (val * h);
            document.getElementById("caja-horas").style.display = (val > 1000) ? "none" : "block";
            
            let display = (total >= 1000) ? (total/1000) + "KK gold" : total + "k gold";
            document.getElementById("precio-final").innerText = display;

            let msg = `Hola Safegaming! Quiero agendar: ${nombre}. Personaje: ${p}. Total: ${display}.`;
            document.getElementById("boton-whatsapp").href = "https://wa.me/584123576579?text=" + encodeURIComponent(msg);
        }
        window.onload = calcularTotal;
        document.getElementById("personaje").oninput = calcularTotal;
    </script>
</body>
</html>
