<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Safegaming Service</title>
<style>
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background-color: #030008; background-size: cover; background-position: center; transition: background-image 1s ease-in-out; }
    .caja { border: 2px solid rgba(0, 242, 255, 0.7); padding: 25px; border-radius: 16px; background: rgba(6, 2, 16, 0.9); width: 100%; max-width: 450px; backdrop-filter: blur(10px); }
    #estado-servicio { text-align: center; margin-bottom: 10px; font-weight: bold; padding: 8px; border-radius: 5px; font-size: 13px; cursor: pointer; }
    h1 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 24px; margin: 0 0 15px 0; text-align: center; }
    label { display: block; margin: 10px 0 4px 0; font-size: 13px; color: #ccc; }
    select, input { padding: 10px; width: 100%; border-radius: 6px; border: 1px solid #00f2ff; background: #070d1a; color: white; }
    /* Brillo dorado */
    .oro-brillo { color: #ffd700; text-shadow: 0 0 8px #ffd700; font-weight: bold; text-align: center; margin: 15px 0; font-size: 18px; }
    .btn-wa { background: #25D366; color: white; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 6px; display: block; text-align: center; }
</style>
</head>
<body>

<div class="caja">
    <div id="estado-servicio">Cargando...</div>
    <h1 ondblclick="abrirAdmin()">🛡️ SAFEGAMING SERVICE 🛡️</h1>
    
    <label>Servicio:</label>
    <select id="servicio" onchange="calcularTotal()">
        <option value="300">Skill Normal - $300k / hr</option>
        <option value="360">Power Training - $360k / hr</option>
        <option value="600">Subida de Nivel - $600k / hr</option>
        <option value="1400">Pack Maraton (5h) - 1.4KK</option>
        <option value="1700">Pack Ptrain Pro (5h) - 1.7KK</option>
    </select>

    <label>Horas:</label>
    <input type="number" id="horas" value="1" min="1" oninput="calcularTotal()">

    <div id="total-final" class="oro-brillo">300k gold</div>
    
    <a href="#" id="boton-whatsapp" class="btn-wa" onclick="reproducirSonido(); enviarWhatsApp()">💬 APARTAR CUPO</a>
</div>

<!-- Sonido -->
<audio id="sonido-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJhCtpBQoE_amS6uR9rdNKCx6AbayTIc",
        authDomain: "shareskill-8d1fe.firebaseapp.com",
        databaseURL: "https://shareskill-8d1fe-default-rtdb.firebaseio.com",
        projectId: "shareskill-8d1fe",
        storageBucket: "shareskill-8d1fe.firebasestorage.app",
        messagingSenderId: "1044347975822",
        appId: "1:1044347975822:web:f91a7fb96a11358e8bb1df"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    const estadoRef = ref(db, 'disponible');

    onValue(estadoRef, (snapshot) => {
        window.estaDisponible = snapshot.val();
        let el = document.getElementById("estado-servicio");
        el.innerText = window.estaDisponible ? "🟢 Estado: Disponible" : "🔴 Estado: No disponible";
        el.style.background = window.estaDisponible ? "rgba(0, 255, 0, 0.2)" : "rgba(255, 0, 0, 0.2)";
        document.getElementById("boton-whatsapp").style.pointerEvents = window.estaDisponible ? "auto" : "none";
    });

    window.toggleEstadoCloud = () => set(estadoRef, !window.estaDisponible);
    document.getElementById("estado-servicio").onclick = toggleEstadoCloud;

    window.calcularTotal = () => {
        let s = document.getElementById('servicio').value, h = document.getElementById('horas').value;
        let t = (s >= 1400) ? s : s * h;
        document.getElementById('total-final').innerText = (t >= 1000) ? (t/1000) + "KK gold" : t + "k gold";
    };

    window.reproducirSonido = () => document.getElementById('sonido-click').play();

    window.enviarWhatsApp = () => {
        let s = document.getElementById('servicio').options[document.getElementById('servicio').selectedIndex].text;
        window.open("https://wa.me/584123576579?text=" + encodeURIComponent(`Hola, quiero el servicio: ${s}`), '_blank');
    };
</script>
</body>
</html>
