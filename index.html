<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Service - Rucoy Online</title>
<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column; /* Cambiado a columna */
        justify-content: center;
        align-items: center;
        background-color: #030008;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
        background-repeat: no-repeat;
        transition: background-image 1s ease-in-out;
    }

    .caja {
        border: 2px solid rgba(0, 242, 255, 0.7);
        padding: 25px;
        border-radius: 16px;
        background: rgba(6, 2, 16, 0.85); 
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0,242,255,0.3);
        max-width: 450px;
        width: 100%;
        margin-bottom: 20px; /* Separación del footer */
    }

    h1 {
        color: #00f2ff;
        text-shadow: 0 0 10px #00f2ff;
        font-size: 24px;
        margin: 0 0 5px 0;
        text-align: center;
    }

    .subtitle {
        color: #ffd700;
        font-weight: bold;
        margin-bottom: 15px;
        font-size: 12px;
        letter-spacing: 1px;
        text-align: center;
    }

    .horario-box {
        background: rgba(255, 215, 0, 0.1);
        border: 1px solid rgba(255, 215, 0, 0.4);
        border-radius: 8px;
        padding: 8px;
        text-align: center;
        font-size: 12px;
        color: #ffd700;
    }

    label { display: block; margin: 12px 0 4px 0; font-size: 14px; }

    input, select {
        padding: 12px;
        width: 100%;
        border-radius: 6px;
        border: 1px solid rgba(0, 242, 255, 0.5);
        background: rgba(7, 13, 26, 0.8);
        color: white;
    }

    .resultado-caja {
        background: rgba(0, 242, 255, 0.1);
        border: 1px dashed rgba(0, 242, 255, 0.5);
        padding: 15px;
        margin-top: 15px;
        border-radius: 6px;
        text-align: center;
    }

    .total-oro { color: #ffd700; font-size: 20px; font-weight: bold; }

    .btn-wa {
        background: #25D366;
        color: white;
        padding: 15px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 6px;
        display: block;
        text-align: center;
        margin-top: 15px;
    }

    .footer {
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        text-align: center;
        max-width: 450px;
        line-height: 1.4;
    }

    hr { border: 0; height: 1px; background: rgba(0,242,255,0.3); margin: 15px 0; }
</style>
</head>
<body>

    <div class="caja">
        <h1>🛡️ SAFEGAMING 🛡️</h1>
        <div class="subtitle">RUCOY ONLINE SERVICE</div>
        <div class="horario-box">🕒 9:00 AM - 7:00 PM</div>
        <hr>

        <label>Personaje:</label>
        <input type="text" id="personaje" value="JugadorAnonimo">

        <label>Servicio:</label>
        <select id="servicio" onchange="calcularTotal()">
            <option value="300">Skill Normal - $300k / hr</option>
            <option value="360">Power Training - $360k / hr</option>
            <option value="600">Subida de Nivel - $600k / hr</option>
            <option value="1400">Pack Maraton (5h) - 1.4KK</option>
        </select>

        <div id="caja-horas">
            <label>Horas:</label>
            <input type="number" id="horas" value="1" min="1" oninput="calcularTotal()">
        </div>

        <div class="resultado-caja">
            <div class="total-oro" id="precio-final">300k gold</div>
        </div>

        <a href="#" id="boton-whatsapp" class="btn-wa">💬 APARTAR CUPO</a>
    </div>

    <div class="footer">
        Servicio profesional de Skilleo y Share<br>
        WhatsApp: +58 412-3576579
    </div>

    <script>
        // (Tu lógica JS se mantiene igual, asegúrate de copiarla aquí)
        // He simplificado el CSS para que el footer siempre quede debajo de la caja
        // sin importar el tamaño de la pantalla.
    </script>
</body>
</html>
