<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Service - Rucoy Online</title>
<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        padding: 30px;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        padding-left: 8%;
        /* Configuración base para el fondo */
        background-color: #030008;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
        background-repeat: no-repeat;
        /* Transición suave al cambiar la imagen */
        transition: background-image 1.5s ease-in-out;
    }

    .caja {
        border: 2px solid rgba(0, 242, 255, 0.7);
        padding: 30px 25px;
        border-radius: 16px;
        background: rgba(6, 2, 16, 0.75); 
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 0 30px rgba(0,242,255,0.3);
        max-width: 450px;
        width: 100%;
        position: relative;
        z-index: 2;
    }

    /* Estilos de texto y botones mantenidos según tu diseño */
    h1 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff, 0 0 20px rgba(0,242,255,0.3); font-size: 28px; margin: 0 0 5px 0; }
    .subtitle { color: #ffd700; font-weight: bold; margin-bottom: 15px; font-size: 13px; letter-spacing: 1px; }
    .horario-box { background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 8px; padding: 6px 12px; margin-bottom: 15px; display: inline-block; font-size: 12px; color: #ffd700; }
    label { display: block; text-align: left; margin: 12px 0 4px 0; color: #e0e6ed; font-size: 14px; }
    input, select { padding: 10px; width: 100%; border-radius: 6px; border: 1px solid rgba(0, 242, 255, 0.5); background: rgba(7, 13, 26, 0.8); color: white; font-size: 15px; }
    .total-oro { color: #ffd700; font-size: 22px; font-weight: bold; }
    .btn-wa { background: #25D366; color: white; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 6px; display: block; margin-top: 15px; text-align: center; }
    .btn-personalizado { display: block; width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid rgba(255, 215, 0, 0.4); background: rgba(255, 215, 0, 0.05); color: #ffd700; text-align: center; text-decoration: none; }
    .footer { position: absolute; bottom: 15px; left: 30px; color: rgba(255, 255, 255, 0.5); font-size: 11px; z-index: 2; }

    @media (max-width: 768px) {
        body { justify-content: center; padding-left: 20px; padding-right: 20px; }
        .footer { position: relative; bottom: 0; left: 0; text-align: center; margin-top: 20px; }
    }
</style>
</head>
<body>

    <div class="caja">
        <h1>🛡️ SAFEGAMING SERVICE 🛡️</h1>
        <div class="subtitle">RUCOY ONLINE: SHARE &amp; SKILLEO PROFESIONAL</div>
        <div class="horario-box">🕒 <b>HORARIO DE TRABAJO:</b> 9:00 AM - 7:00 PM</div>
        <hr>

        <label>Nombre de tu Personaje:</label>
        <input type="text" id="personaje" value="JugadorAnonimo">

        <label>Selecciona el Servicio:</label>
        <select id="servicio" onchange="calcularTotal()">
            <option value="300">Skill Normal - $300k / hr</option>
            <option value="360">Power Training - $360k / hr</option>
            <option value="600">Subida de Nivel - $600k / hr</option>
            <option value="1400">Pack Maraton (5h) - 1.4KK</option>
            <option value="1700">Pack Ptrain Pro (5h) - 1.7KK</option>
        </select>

        <div id="caja-horas">
            <label>Cantidad de Horas:</label>
            <input type="number" id="horas" value="1" min="1" max="24" oninput="calcularTotal()">
        </div>

        <div class="resultado-caja" style="background: rgba(0, 242, 255, 0.1); border: 1px dashed rgba(0, 242, 255, 0.5); padding: 12px; margin-top: 15px; border-radius: 6px;">
            <p style="margin:0 0 5px 0; color:#a0aab5;">Total a pagar estimado:</p>
            <div class="total-oro" id="precio-final">300k gold</div>
        </div>

        <a href="#" id="boton-whatsapp" class="btn-wa" target="_blank">💬 APARTAR CUPO POR WHATSAPP</a>
        <a href="https://wa.me/584123576579" class="btn-personalizado" target="_blank">📩 Cotización personalizada</a>
    </div>

    <div class="footer">
        Servicio profesional de Skilleo y Share para Rucoy Online<br>
        WhatsApp: +58 412-3576579
    </div>

    <script>
        const fondos = [
            "https://assets-prd.ignimgs.com/2025/08/27/solothumb-1756317128314.png",
            "https://sm.ign.com/t/ign_in/photo/default/solo-leveling-arise-overdrive-blogroll-1759428421562_e9mp.1280.jpg",
            "https://imgsrv.crunchyroll.com/cdn-cgi/image/fit=cover,format=auto,quality=85,width=1920/keyart/GDKHZEJ0K-backdrop_wide"
        ];
        
        let indiceActual = 0;

        function rotarFondos() {
            document.body.style.backgroundImage = `url('${fondos[indiceActual]}')`;
            indiceActual = (indiceActual + 1) % fondos.length;
        }

        function calcularTotal() {
            let s = document.getElementById("servicio");
            let v = parseInt(s.value);
            let h = parseInt(document.getElementById("horas").value) || 1;
            let total = (v === 1400 || v === 1700) ? v : (v * h);
            
            document.getElementById("caja-horas").style.display = (v > 1000) ? "none" : "block";
            let display = (total >= 1000) ? (total/1000) + "KK gold" : total + "k gold";
            document.getElementById("precio-final").innerText = display;

            let msg = `Hola! Quiero agendar: ${s.options[s.selectedIndex].text.split('-')[0].trim()}. Personaje: ${document.getElementById("personaje").value}. Total: ${display}.`;
            document.getElementById("boton-whatsapp").href = `https://wa.me/584123576579?text=${encodeURIComponent(msg)}`;
        }

        window.onload = () => {
            rotarFondos();
            setInterval(rotarFondos, 30000);
            calcularTotal();
        };
        document.getElementById("personaje").oninput = calcularTotal;
    </script>
</body>
</html>
