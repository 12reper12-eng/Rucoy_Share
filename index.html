<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Service - Rucoy Online</title>
<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        background-color: #030008;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
        background-repeat: no-repeat;
        transition: background-image 1s ease-in-out;
    }

    .caja {
        border: 2px solid rgba(0, 242, 255, 0.7);
        padding: 25px;
        border-radius: 16px;
        background: rgba(6, 2, 16, 0.85); 
        backdrop-filter: blur(8px);
        box-shadow: 0 0 30px rgba(0,242,255,0.3);
        width: 100%;
        max-width: 450px;
        z-index: 2;
    }

    h1 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 24px; margin: 0 0 5px 0; text-align: center; }
    .subtitle { color: #ffd700; font-weight: bold; margin-bottom: 15px; font-size: 13px; text-align: center; }
    .horario-box { background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 8px; padding: 8px; margin-bottom: 15px; text-align: center; font-size: 12px; color: #ffd700; }
    label { display: block; margin: 12px 0 4px 0; font-size: 14px; }
    input, select { padding: 10px; width: 100%; border-radius: 6px; border: 1px solid rgba(0, 242, 255, 0.5); background: rgba(7, 13, 26, 0.8); color: white; }
    .resultado-caja { background: rgba(0, 242, 255, 0.1); border: 1px dashed rgba(0, 242, 255, 0.5); padding: 12px; margin-top: 15px; border-radius: 6px; text-align: center; }
    .total-oro { color: #ffd700; font-size: 20px; font-weight: bold; }
    .btn-wa { background: #25D366; color: white; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 6px; display: block; text-align: center; margin-top: 15px; }
    .footer { margin-top: 20px; color: rgba(255, 255, 255, 0.6); font-size: 12px; text-align: center; z-index: 2; }

    /* Estilos para PC (pantallas más grandes) */
    @media (min-width: 769px) {
        body { align-items: flex-start; padding-left: 10%; justify-content: center; }
        .caja { max-width: 450px; }
    }
</style>
</head>
<body>

    <div class="caja">
        <h1>🛡️ SAFEGAMING SERVICE 🛡️</h1>
        <div class="subtitle">RUCOY ONLINE: SHARE & SKILLEO PROFESIONAL</div>
        <div class="horario-box">🕒 <b>HORARIO DE TRABAJO:</b> 9:00 AM - 7:00 PM</div>
        
        <label>Nombre de tu Personaje:</label>
        <input type="text" id="personaje" value="JugadorAnonimo">

        <label>Selecciona el Servicio:</label>
        <select id="servicio" onchange="calcularTotal()">
            <option value="300">Skill Normal - $300k / hr</option>
            <option value="360">Power Training (Ptrain) - $360k / hr</option>
            <option value="600">Subida de Nivel (Up Lvl) - $600k / hr</option>
            <option value="1400">Pack Maraton (5h Skill) - 1.4KK total</option>
            <option value="1700">Pack Ptrain Pro (5h Ptrain) - 1.7KK total</option>
        </select>

        <div id="caja-horas">
            <label>Cantidad de Horas:</label>
            <input type="number" id="horas" value="1" min="1" max="24" oninput="calcularTotal()">
        </div>

        <div class="resultado-caja">
            <div class="total-oro" id="precio-final">300k gold</div>
        </div>

        <a href="#" id="boton-whatsapp" class="btn-wa" target="_blank">💬 APARTAR CUPO POR WHATSAPP</a>
    </div>

    <div class="footer">
        Servicio profesional de Skilleo y Share para Rucoy Online<br>
        Atención directa por WhatsApp: +58 412-3576579
    </div>

    <script>
        const fondos = [
            "https://assets-prd.ignimgs.com/2025/08/27/solothumb-1756317128314.png",
            "https://sm.ign.com/t/ign_in/photo/default/solo-leveling-arise-overdrive-blogroll-1759428421562_e9mp.1280.jpg",
            "https://imgsrv.crunchyroll.com/cdn-cgi/image/fit=cover,format=auto,quality=85,width=1920/keyart/GDKHZEJ0K-backdrop_wide"
        ];
        let indiceActual = 0;

        function rotarFondos() {
            document.body.style.backgroundImage = "url('" + fondos[indiceActual] + "')";
            indiceActual = (indiceActual + 1) % fondos.length;
        }

        function calcularTotal() {
            let personaje = document.getElementById("personaje").value;
            let servicioSelect = document.getElementById("servicio");
            let precioBase = parseInt(servicioSelect.value);
            let nombreServicio = servicioSelect.options[servicioSelect.selectedIndex].text.split('-')[0].trim();
            let horas = parseInt(document.getElementById("horas").value) || 1;
            let cajaHoras = document.getElementById("caja-horas");
            let totalK = 0;
            let textoPrecio = "";

            if (precioBase === 1400 || precioBase === 1700) {
                cajaHoras.style.display = "none";
                totalK = precioBase;
                textoPrecio = (totalK / 1000) + "KK gold";
            } else {
                cajaHoras.style.display = "block";
                totalK = precioBase * horas;
                textoPrecio = (totalK >= 1000) ? (totalK / 1000) + "KK gold" : totalK + "k gold";
            }

            document.getElementById("precio-final").innerText = textoPrecio;
            let mensaje = "Hola Safegaming! Vengo de la web. Quiero agendar:\nPersonaje: " + personaje + "\nServicio: " + nombreServicio + "\nTotal: " + textoPrecio;
            document.getElementById("boton-whatsapp").href = "https://wa.me/584123576579?text=" + encodeURIComponent(mensaje);
        }

        window.onload = function() {
            rotarFondos();
            setInterval(rotarFondos, 30000);
            calcularTotal();
        };
        document.getElementById("personaje").oninput = calcularTotal;
    </script>
</body>
</html>
