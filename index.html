<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Control Center</title>
<style>
    body { background: #030008; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .caja { border: 2px solid #00f2ff; padding: 25px; border-radius: 16px; background: rgba(6, 2, 16, 0.95); width: 100%; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
    .barra-exterior { width: 100%; height: 25px; background: #111; border-radius: 15px; margin: 20px 0; overflow: hidden; border: 2px solid #00f2ff; }
    #barra-xp { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #0077ff); transition: width 1s linear; }
    #panel-admin { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; text-align: left; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #00f2ff; background: #070d1a; color: white; font-weight: bold; cursor: pointer; }
    button:hover { background: #00f2ff; color: #000; }
    #link-generado { background: #000; padding: 10px; border-radius: 5px; color: #ffd700; font-size: 12px; word-break: break-all; margin-top: 10px; border: 1px dashed #ffd700; }
</style>
</head>
<body>

<div class="caja" id="caja-principal">
    <h1 ondblclick="document.getElementById('panel-admin').style.display='block'" style="cursor:pointer">🛡️ SAFEGAMING</h1>
    
    <div id="vista-cliente" style="display:none;">
        <h2 id="cliente-nombre" style="color:#00f2ff">Cargando...</h2>
        <div class="barra-exterior"><div id="barra-xp"></div></div>
        <div id="reloj" style="font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #00f2ff;">00:00:00</div>
        <p id="estado-servicio" style="margin-top:10px; color:#aaa;"></p>
    </div>

    <div id="panel-admin">
        <h3 style="text-align:center; color:#00f2ff">PANEL ADMIN</h3>
        <input type="text" id="admin-nombre" placeholder="Nombre del cliente">
        <input type="number" id="admin-horas" placeholder="Duración (Horas)">
        <button onclick="generarLink()">GENERAR LINK ÚNICO</button>
        <div id="link-generado"></div>
        <button onclick="copiarLink()" style="background:#25D366; border:none;">📋 COPIAR LINK</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    
    if (params.has('n')) {
        document.getElementById('vista-cliente').style.display = 'block';
        document.querySelector('h1').style.display = 'none';
        
        let nombre = params.get('n');
        let fin = parseInt(params.get('f'));
        let duracion = parseInt(params.get('h'));
        let inicio = fin - (duracion * 3600000);
        
        document.getElementById('cliente-nombre').innerText = "Cliente: " + nombre;
        
        setInterval(() => {
            let ahora = new Date().getTime();
            let total = fin - inicio;
            let pasado = ahora - inicio;
            let porcentaje = Math.min((pasado / total) * 100, 100);
            
            document.getElementById('barra-xp').style.width = porcentaje + "%";
            
            let restante = fin - ahora;
            if (restante <= 0) {
                document.getElementById('reloj').innerText = "COMPLETADO ✅";
                document.getElementById('estado-servicio').innerText = "Servicio finalizado con éxito.";
            } else {
                let h = Math.floor(restante / 3600000);
                let m = Math.floor((restante % 3600000) / 60000);
                let s = Math.floor((restante % 60000) / 1000);
                document.getElementById('reloj').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }, 1000);
    }

    function generarLink() {
        let nombre = document.getElementById('admin-nombre').value;
        let horas = document.getElementById('admin-horas').value;
        if(!nombre || !horas) return alert("Completa los datos");
        let fin = new Date().getTime() + (horas * 3600000);
        let link = window.location.origin + window.location.pathname + `?n=${nombre}&h=${horas}&f=${fin}`;
        document.getElementById('link-generado').innerText = link;
    }

    function copiarLink() {
        let texto = document.getElementById('link-generado').innerText;
        navigator.clipboard.writeText(texto).then(() => alert("¡Link copiado!"));
    }
</script>
</body>
</html>
