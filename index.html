<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Service - Rucoy Online</title>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    
    const db = getDatabase(initializeApp({
        databaseURL: "https://shareskill-8d1fe-default-rtdb.firebaseio.com"
    }));

    window.db = db; window.ref = ref; window.onValue = onValue; window.set = set; 
    window.push = push; window.update = update; window.get = get;

    const estadoRef = ref(db, 'disponible');
    onValue(estadoRef, (s) => {
        window.estaDisponible = s.val();
        let el = document.getElementById("estado-servicio");
        if(el) {
            el.innerText = window.estaDisponible ? "🟢 SERVICIO DISPONIBLE" : "🔴 NO DISPONIBLE";
            el.style.background = window.estaDisponible ? "rgba(0, 255, 0, 0.2)" : "rgba(255, 0, 0, 0.2)";
        }
        let btn = document.getElementById("boton-whatsapp");
        if(btn) btn.style.pointerEvents = window.estaDisponible ? "auto" : "none";
    });

    window.cambiarEstado = () => set(estadoRef, !window.estaDisponible);

    window.registrarCliente = (nombre, horas) => {
        const clientesRef = ref(db, 'clientes');
        get(clientesRef).then((snapshot) => {
            let encontrado = false;
            snapshot.forEach((child) => {
                if (child.val().nombre.toLowerCase() === nombre.toLowerCase()) {
                    let totalHoras = (child.val().totalHoras || 0) + horas;
                    update(ref(db, 'clientes/' + child.key), { totalHoras: totalHoras });
                    encontrado = true;
                }
            });
            if (!encontrado) push(clientesRef, { nombre: nombre, totalHoras: horas });
        });
    };
</script>

<style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; color: white; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background-color: #030008; background-position: center; background-size: cover; background-attachment: fixed; transition: background-image 1s ease-in-out; }
    .caja { border: 2px solid rgba(0, 242, 255, 0.7); padding: 25px; border-radius: 16px; background: rgba(6, 2, 16, 0.85); backdrop-filter: blur(8px); box-shadow: 0 0 30px rgba(0,242,255,0.3); width: 100%; max-width: 450px; }
    #estado-servicio { text-align: center; margin-bottom: 15px; font-weight: bold; padding: 10px; border-radius: 8px; border: 1px solid #00f2ff; }
    #vista-seguimiento, #vista-referencias { display: none; text-align: center; }
    h1 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 24px; margin: 0 0 5px 0; text-align: center; cursor: default; }
    .subtitle { color: #ffd700; font-weight: bold; margin-bottom: 15px; font-size: 13px; text-align: center; }
    .horario-box { background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 8px; padding: 8px; margin-bottom: 15px; text-align: center; font-size: 12px; color: #ffd700; }
    label { display: block; margin: 10px 0 4px 0; font-size: 13px; color: #ccc; }
    input, select { padding: 10px; width: 100%; border-radius: 6px; border: 1px solid rgba(0, 242, 255, 0.5); background: rgba(7, 13, 26, 0.8); color: white; margin-bottom: 5px; cursor: pointer;}
    .resultado-caja { background: rgba(0, 242, 255, 0.1); border: 1px dashed rgba(0, 242, 255, 0.5); padding: 12px; margin-top: 15px; border-radius: 6px; text-align: center; }
    .total-oro { color: #ffd700; font-size: 20px; font-weight: bold; }
    .btn-wa { background: #25D366; color: white; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 6px; display: block; text-align: center; margin-top: 15px; cursor: pointer; }
    .footer { margin-top: 20px; color: rgba(255, 255, 255, 0.6); font-size: 12px; text-align: center; }
    #panel-admin { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; }
    .lista-item { padding: 8px; border-bottom: 1px solid #333; font-size: 11px; text-align: left; }
    .tabla-rangos { width: 100%; font-size: 11px; margin-top: 15px; border-collapse: collapse; border: 1px solid #444; color: #ccc; }
    .tabla-rangos th, .tabla-rangos td { padding: 6px; border: 1px solid #444; text-align: center; }
</style>
</head>
<body>

    <div class="caja" id="contenedor">
        <div id="vista-seguimiento">
            <h1 id="cliente-nombre">Seguimiento</h1>
            <div id="rango-cliente" style="font-size: 18px; margin: 5px 0;"></div>
            <div id="reloj" style="font-size: 40px; color: #ffd700; margin: 20px 0; font-weight: bold;">00:00:00</div>
        </div>

        <div id="vista-referencias" class="caja">
            <h2 style="color:#00f2ff; margin-top:0;">📋 Lista de Referencias</h2>
            <div id="contenido-referencias" style="color:white; font-size: 14px; text-align: left;"></div>
            <button onclick="document.getElementById('vista-referencias').style.display='none'; document.getElementById('vista-formulario').style.display='block';" style="width:100%; margin-top:15px; padding:10px; cursor:pointer;">Cerrar</button>
        </div>

        <div id="vista-formulario">
            <div id="estado-servicio">Cargando...</div>
            <h1 ondblclick="verificarAdmin()">🛡️ SAFEGAMING SERVICE 🛡️</h1>
            <button onclick="mostrarReferencias()" style="width:100%; padding:10px; background: #333; color: white; cursor:pointer; margin-bottom:15px; border:none; border-radius:6px;">📊 VER REFERENCIAS</button>
            
            <label>Nombre del Personaje:</label>
            <input type="text" id="personaje" placeholder="Ej: RucoyPro" oninput="calcularTotal()">
            <label>Elige tu Profesión:</label>
            <select id="clase" onchange="calcularTotal()">
                <option value="Melee">⚔️ Melee</option>
                <option value="Distance">🏹 Distancia</option>
                <option value="Magic">✨ Magia</option>
            </select>
            <label>Nivel de tu Skill:</label>
            <input type="number" id="nivel-skill" placeholder="Ej: 100" min="1" oninput="actualizarBarra()">
            <div id="contenedor-barra" style="margin-top:10px; display:none; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px;">
                <div style="font-size: 11px; margin-bottom: 3px;">Rango Actual: <span id="nombre-rango">Bronce</span></div>
                <div style="width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden;">
                    <div id="barra-progreso" style="width: 0%; height: 100%; background: #cd7f32; transition: width 0.3s, background 0.3s;"></div>
                </div>
            </div>

            <table class="tabla-rangos">
                <tr><th>Rango</th><th>Horas</th></tr>
                <tr><td style="color:#c0c0c0;">⚪ PLATA</td><td>20+</td></tr>
                <tr><td style="color:#ffd700;">🟡 ORO</td><td>30+</td></tr>
                <tr><td style="color:#00f2ff;">💎 DIAMANTE</td><td>50+</td></tr>
                <tr><td style="color:#FFD700;">👑 VIP</td><td>1000+</td></tr>
                <tr><td style="color:#ff4500;">⚡ LEYENDA II</td><td>2000+</td></tr>
            </table>

            <label>Servicio:</label>
            <select id="servicio" onchange="calcularTotal()">
                <option value="300">Skill Normal - $300k / hr</option>
                <option value="360">Power Training - $360k / hr</option>
            </select>
            <label>Cantidad de Horas:</label>
            <input type="number" id="horas" value="1" min="1" oninput="calcularTotal()">
            <a href="#" id="boton-whatsapp" class="btn-wa" onclick="reproducirYRedirigir()">💬 APARTAR CUPO POR WHATSAPP</a>
            
            <div id="panel-admin">
                <button onclick="cambiarEstado()" style="width:100%; padding:10px; background: #ff0000; color: white; cursor:pointer;">CAMBIAR ESTADO</button>
                <hr>
                <input type="text" id="ref-nombre" placeholder="Nombre Ref">
                <input type="number" id="ref-nivel" placeholder="Nivel">
                <button onclick="agregarReferencia()" style="width:100%; padding:10px; background:green; color:white;">AGREGAR REFERENCIA</button>
                <button onclick="limpiarReferencias()" style="width:100%; padding:10px; background:maroon; color:white; margin-top:5px;">BORRAR TODAS</button>
                <hr>
                <input type="text" id="admin-nombre" placeholder="Nombre cliente">
                <button onclick="generarLink()" style="width:100%; padding:10px; cursor:pointer;">GENERAR LINK</button>
            </div>
        </div>
    </div>

    <audio id="sonido-level" src="universfield-level-up-191997.mp3" preload="auto"></audio>
    <div class="footer">Servicio profesional de Skilleo y Share</div>

    <script>
        let misReferencias = JSON.parse(localStorage.getItem('referencias')) || [];

        function agregarReferencia() {
            let n = document.getElementById('ref-nombre').value;
            let lv = document.getElementById('ref-nivel').value;
            if(n && lv) {
                misReferencias.push({nombre: n, nivel: lv});
                localStorage.setItem('referencias', JSON.stringify(misReferencias));
                alert("Referencia agregada");
            }
        }
        function limpiarReferencias() { misReferencias = []; localStorage.removeItem('referencias'); alert("Lista borrada"); }

        function mostrarReferencias() {
            document.getElementById('vista-formulario').style.display = 'none';
            document.getElementById('vista-referencias').style.display = 'block';
            let lista = document.getElementById('contenido-referencias');
            lista.innerHTML = "";
            misReferencias.forEach(r => {
                lista.innerHTML += `<div style="padding: 8px; border-bottom: 1px solid #333;">👤 ${r.nombre} - <b style="color:#ffd700;">Nivel ${r.nivel}</b></div>`;
            });
        }

        // --- Funciones de Lógica ---
        function verificarAdmin() {
            let pass = prompt("Contraseña:");
            if(pass === "Iscarlos2006") document.getElementById('panel-admin').style.display = 'block';
        }
        function calcularTotal() {
            let p = parseInt(document.getElementById("servicio").value);
            let h = parseInt(document.getElementById("horas").value) || 1;
            let total = p * h;
            document.getElementById("precio-final") ? document.getElementById("precio-final").innerText = (total >= 1000) ? (total / 1000) + "KK gold" : total + "k gold" : "";
        }
        function actualizarBarra() {
            let nivel = parseInt(document.getElementById("nivel-skill").value) || 0;
            document.getElementById("contenedor-barra").style.display = nivel > 0 ? "block" : "none";
            let config = { rango: "Bronce", color: "#cd7f32", ancho: "20%" };
            if(nivel >= 250) config = { rango: "Diamante", color: "#b9f2ff", ancho: "100%" };
            else if(nivel >= 100) config = { rango: "Plata", color: "#c0c0c0", ancho: "40%" };
            document.getElementById("nombre-rango").innerText = config.rango;
            document.getElementById("barra-progreso").style.width = config.ancho;
            document.getElementById("barra-progreso").style.background = config.color;
        }
        function reproducirYRedirigir() {
            document.getElementById('sonido-level').play();
            setTimeout(() => { window.open("https://wa.me/584123576579", '_blank'); }, 600);
        }
        function generarLink() { alert("Link generado"); }

        // --- Fondos ---
        const fondos = ["https://assets-prd.ignimgs.com/2025/08/27/solothumb-1756317128314.png", "https://sm.ign.com/t/ign_in/photo/default/solo-leveling-arise-overdrive-blogroll-1759428421562_e9mp.1280.jpg"];
        let idx = 0; function rotar() { document.body.style.backgroundImage = "url('" + fondos[idx] + "')"; idx = (idx + 1) % fondos.length; }
        window.onload = () => { rotar(); setInterval(rotar, 30000); };
    </script>
</body>
</html>
