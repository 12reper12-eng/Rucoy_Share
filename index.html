<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Service - Rucoy Online</title>
<style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background-color: #030008; background-size: cover; background-attachment: fixed; transition: background-image 1s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGold { 0% { transform: scale(1); text-shadow: 0 0 0 #ffd700; } 50% { transform: scale(1.1); text-shadow: 0 0 15px #ffd700; } 100% { transform: scale(1); text-shadow: 0 0 0 #ffd700; } }
    .destello { animation: pulseGold 0.4s ease-out; }
    .caja { border: 2px solid rgba(0, 242, 255, 0.7); padding: 25px; border-radius: 16px; background: rgba(6, 2, 16, 0.85); backdrop-filter: blur(8px); box-shadow: 0 0 30px rgba(0,242,255,0.3); width: 100%; max-width: 450px; animation: fadeIn 0.8s ease-out; }
    
    /* Estilos nuevos integrados */
    #panel-admin { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; text-align: left; }
    #vista-cliente { display: none; text-align: center; }
    .barra-exterior { width: 100%; height: 25px; background: #111; border-radius: 15px; margin: 20px 0; overflow: hidden; border: 2px solid #00f2ff; }
    #barra-xp { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #0077ff); transition: width 1s linear; }
    
    h1 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 24px; margin: 0 0 5px 0; text-align: center; cursor: pointer; }
    .btn-wa { background: #25D366; color: white; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 6px; display: block; text-align: center; margin-top: 15px; }
    input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #00f2ff; background: #070d1a; color: white; }
</style>
</head>
<body>

    <div class="caja" id="caja-principal">
        <h1 ondblclick="document.getElementById('panel-admin').style.display='block'">🛡️ SAFEGAMING SERVICE 🛡️</h1>
        
        <!-- Vista del cliente (Se oculta si el usuario es normal) -->
        <div id="vista-cliente">
            <h2 id="cliente-nombre" style="color:#00f2ff">Cargando servicio...</h2>
            <div class="barra-exterior"><div id="barra-xp"></div></div>
            <div id="reloj" style="font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #00f2ff;">00:00:00</div>
        </div>

        <!-- Formulario Original -->
        <div id="formulario-normal">
            <div id="mensaje-bienvenida" style="text-align: center; color: #00f2ff; font-weight: bold; margin-bottom:10px;">¡Bienvenido, guerrero! 👋</div>
            <label>Nombre del Personaje:</label>
            <input type="text" id="personaje" placeholder="Ej: RucoyPro">
            <label>Servicio:</label>
            <select id="servicio">
                <option value="300">Skill Normal - $300k / hr</option>
                <option value="1700">Pack Ptrain Pro - 1.7KK</option>
            </select>
            <a href="#" id="boton-whatsapp" class="btn-wa" onclick="reproducirSonido()">💬 APARTAR CUPO</a>
        </div>

        <!-- Panel Admin Oculto -->
        <div id="panel-admin">
            <h3 style="color:#00f2ff; text-align:center;">PANEL ADMIN</h3>
            <input type="text" id="admin-nombre" placeholder="Nombre cliente">
            <input type="number" id="admin-horas" placeholder="Horas">
            <button onclick="generarLink()">GENERAR LINK ÚNICO</button>
            <div id="link-generado" style="font-size:10px; word-break:break-all; color:#ffd700; margin-top:10px;"></div>
        </div>
    </div>

    <script>
        // Lógica de detección de Link Privado
        const params = new URLSearchParams(window.location.search);
        if (params.has('n')) {
            document.getElementById('formulario-normal').style.display = 'none';
            document.getElementById('vista-cliente').style.display = 'block';
            
            let fin = parseInt(params.get('f'));
            let duracion = parseInt(params.get('h'));
            let inicio = fin - (duracion * 3600000);
            document.getElementById('cliente-nombre').innerText = "Cliente: " + params.get('n');
            
            setInterval(() => {
                let ahora = new Date().getTime();
                let restante = fin - ahora;
                let porcentaje = Math.min(((ahora - inicio) / (duracion * 3600000)) * 100, 100);
                document.getElementById('barra-xp').style.width = porcentaje + "%";
                
                if (restante <= 0) {
                    document.getElementById('reloj').innerText = "COMPLETADO ✅";
                } else {
                    let h = Math.floor(restante / 3600000);
                    let m = Math.floor((restante % 3600000) / 60000);
                    let s = Math.floor((restante % 60000) / 1000);
                    document.getElementById('reloj').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }

        function generarLink() {
            let nombre = document.getElementById('admin-nombre').value;
            let horas = document.getElementById('admin-horas').value;
            let fin = new Date().getTime() + (horas * 3600000);
            let link = window.location.href.split('?')[0] + `?n=${nombre}&h=${horas}&f=${fin}`;
            document.getElementById('link-generado').innerText = link;
        }

        function reproducirSonido() { /* Tu función de sonido existente */ }
    </script>
</body>
</html>
