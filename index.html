<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safegaming Service</title>
<style>
    /* Estilos base (Móvil primero) */
    * { box-sizing: border-box; }
    body {
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        min-height: 100vh;
        background-color: #030008;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .caja {
        border: 2px solid rgba(0, 242, 255, 0.7);
        padding: 25px;
        border-radius: 16px;
        background: rgba(6, 2, 16, 0.85); 
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0,242,255,0.3);
        width: 100%;
        max-width: 450px; /* Tamaño ideal para móvil */
    }

    /* Ajustes para PC (Pantallas grandes) */
    @media (min-width: 1024px) {
        .caja {
            max-width: 500px;
            padding: 40px; /* Más espacio en PC */
        }
        h1 { font-size: 32px !important; }
    }

    h1 { color: #00f2ff; text-align: center; margin-top: 0; }
    
    .footer {
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        text-align: center;
    }

    /* ... Mantén aquí tus estilos de inputs, botones y select igual que antes ... */
    input, select { padding: 12px; width: 100%; border-radius: 6px; border: 1px solid rgba(0, 242, 255, 0.5); background: rgba(7, 13, 26, 0.8); color: white; margin-top: 5px; }
    .btn-wa { background: #25D366; display: block; padding: 15px; text-align: center; color: white; text-decoration: none; border-radius: 6px; margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>

    <div class="caja">
        <h1>🛡️ SAFEGAMING SERVICE</h1>
        <!-- Resto de tu contenido (inputs, selects, etc.) -->
    </div>

    <div class="footer">
        Servicio profesional de Rucoy Online<br>
        Atención: +58 412-3576579
    </div>

</body>
</html>
